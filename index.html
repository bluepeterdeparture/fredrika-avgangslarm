<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#06162b" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link rel="icon" href="icon-512.png" />
  <title>BluePeterDeparture v2.5</title>
  <style>
    :root{
      --bg:#06162b; --panel:#0b213d; --panel2:#102b4c; --text:#f8fbff; --muted:#aac2dc;
      --green:#27e86d; --red:#ff2f2f; --line:rgba(255,255,255,.12); --btn:#17385f;
      --btnActive:#235b96; --shadow:0 16px 34px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
    body.day{--bg:#d7e0eb;--panel:#f7fbff;--panel2:#e8f0f8;--text:#061426;--muted:#20364f;--green:#006f2f;--red:#c00000;--line:rgba(0,0,0,.18);--btn:#c9d9e9;--btnActive:#a9c4df;--shadow:0 10px 22px rgba(0,0,0,.16)}
    .app{height:100dvh;width:100vw;padding:clamp(7px,1.25vw,16px);display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:clamp(5px,1vw,12px);overflow:hidden}
    header{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:start;gap:10px;min-height:0}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .flag{width:clamp(28px,3.2vw,44px);height:clamp(28px,3.2vw,44px);border-radius:7px;background:#0057b8;position:relative;box-shadow:inset 0 0 0 2px rgba(255,255,255,.2);flex:0 0 auto}
    .flag:after{content:"";position:absolute;left:50%;top:50%;width:48%;height:48%;transform:translate(-50%,-50%);background:#fff}
    .route-title{font-size:clamp(18px,2.6vw,36px);font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.05}
    .sub{font-size:clamp(12px,1.35vw,18px);color:var(--muted);font-weight:700;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .clock{font-size:clamp(36px,5.4vw,64px);font-weight:950;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;text-align:right;letter-spacing:.01em;white-space:nowrap}
    main{min-height:0;display:grid;grid-template-columns:minmax(0,1.45fr) minmax(190px,.55fr);gap:clamp(7px,1.2vw,15px);overflow:hidden}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);min-height:0}
    .count-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(8px,1.5vw,22px);overflow:hidden}
    .label{font-size:clamp(14px,1.8vw,26px);font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center}
    .count{font-size:clamp(86px,18vw,220px);font-weight:950;line-height:.84;font-variant-numeric:tabular-nums;color:var(--green);text-align:center;letter-spacing:-.065em;margin:.04em 0}
    .count.red{color:var(--red)}
    .unit{font-size:clamp(26px,4vw,58px);font-weight:950;text-transform:uppercase;color:var(--text);line-height:1;text-align:center}
    .next-time{font-size:clamp(22px,3.3vw,48px);font-weight:950;color:var(--text);margin-top:clamp(3px,.8vw,10px);font-variant-numeric:tabular-nums;text-align:center;white-space:nowrap}
    .side{display:grid;grid-template-rows:auto auto 1fr;gap:clamp(6px,.9vw,10px);min-height:0;overflow:hidden}
    .status{padding:clamp(7px,1vw,13px);display:grid;gap:6px;align-content:start;overflow:hidden}
    .status-line{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:clamp(13px,1.4vw,19px);font-weight:800;border-bottom:1px solid var(--line);padding-bottom:6px;white-space:nowrap}
    .status-line:last-child{border-bottom:0;padding-bottom:0}.dot{width:.72em;height:.72em;border-radius:50%;background:var(--green);display:inline-block;margin-right:.35em}.dot.red{background:var(--red)}
    .controls{padding:clamp(7px,1vw,13px);display:grid;grid-template-columns:1fr;gap:clamp(6px,.9vw,10px)}
    button,select{font:inherit;border:1px solid var(--line);border-radius:14px;background:var(--btn);color:var(--text);font-weight:900;min-height:clamp(38px,5.4vh,54px);padding:8px 10px;box-shadow:none}
    button:active{transform:scale(.985)}button.active{background:var(--btnActive);outline:2px solid rgba(39,232,109,.25)}select{width:100%;background:var(--panel2)}
    .settings{display:none;padding:clamp(7px,1vw,13px);gap:8px;align-content:start}.settings.open{display:grid}.settings-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
    footer{display:flex;align-items:center;justify-content:center;min-height:22px;font-size:clamp(14px,1.45vw,22px);font-weight:900;color:var(--muted);white-space:nowrap;overflow:hidden}
    .tiny-flag{width:1.12em;height:1.12em;border-radius:.16em;background:#0057b8;position:relative;display:inline-block;margin-right:.45em;vertical-align:-.2em;box-shadow:inset 0 0 0 1px rgba(255,255,255,.32);flex:0 0 auto}
    .tiny-flag:after{content:"";position:absolute;left:50%;top:50%;width:48%;height:48%;transform:translate(-50%,-50%);background:#fff}
    @media (max-width:760px){
      .app{padding:6px;gap:5px}main{grid-template-columns:1fr;grid-template-rows:minmax(0,1fr) auto}.side{grid-template-rows:auto auto;grid-template-columns:1fr;gap:5px}.status{grid-template-columns:1fr 1fr 1fr;padding:6px}.status-line{border:0;padding:0;font-size:12px}.controls{grid-template-columns:1fr 1fr;padding:6px;gap:6px}.controls button{min-height:36px;font-size:13px;padding:6px}.settings{position:fixed;left:6px;right:6px;bottom:32px;z-index:9;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.count{font-size:clamp(76px,29vw,150px)}.unit{font-size:clamp(24px,8vw,40px)}.next-time{font-size:clamp(22px,7vw,36px)}footer{font-size:13px;min-height:18px}.clock{font-size:clamp(32px,8vw,44px)}.route-title{font-size:clamp(17px,5vw,24px)}.flag{width:28px;height:28px}
    }
    @media (max-height:460px){
      .app{padding:5px;gap:4px}header{gap:6px}.sub{display:none}.clock{font-size:32px}.route-title{font-size:19px}.flag{width:26px;height:26px}main{grid-template-columns:minmax(0,1.45fr) minmax(170px,.55fr);grid-template-rows:1fr;gap:5px}.count-card{padding:4px}.label{font-size:12px}.count{font-size:clamp(56px,17vw,110px);margin:0}.unit{font-size:22px}.next-time{font-size:21px;margin-top:2px}.side{gap:4px}.status{padding:5px;gap:3px}.status-line{font-size:11px;padding-bottom:3px}.controls{padding:5px;gap:5px;grid-template-columns:1fr}.controls button{min-height:28px;font-size:11px;padding:4px 6px}.settings{position:fixed;right:6px;top:48px;width:min(360px,calc(100vw - 12px));bottom:auto}.settings-grid{gap:5px}footer{font-size:12px;min-height:16px}
    }
    @media (max-width:420px) and (orientation:portrait){
      header{grid-template-columns:1fr}.clock{text-align:left;font-size:36px}.status{display:none}.controls{grid-template-columns:1fr 1fr}.count{font-size:clamp(94px,42vw,160px)}.unit{font-size:36px}.settings{bottom:30px}.settings-grid{grid-template-columns:1fr 1fr 1fr}footer{font-size:13px}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="flag" aria-hidden="true"></div>
      <div style="min-width:0">
        <div class="route-title" id="routeName">Skenäsleden</div>
        <div class="sub" id="fromHarbor">Nästa avgång</div>
      </div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </header>
  <main>
    <section class="card count-card">
      <div class="label" id="mainLabel">Tid kvar</div>
      <div class="count" id="count">--</div>
      <div class="unit" id="unit">minuter</div>
      <div class="next-time" id="nextTime">--:--</div>
    </section>
    <aside class="side">
      <section class="card status">
        <div class="status-line"><span><span class="dot" id="apiDot"></span>Data</span><span id="apiStatus">Hämtar</span></div>
        <div class="status-line"><span>Led</span><span id="routeIdText">--</span></div>
        <div class="status-line"><span>Ljud</span><span id="soundStatus">Tryck test</span></div>
      </section>
      <section class="card controls">
        <button id="testFive">Test 5 min</button>
        <button id="testDeparture">Test avgång</button>
        <button id="wakeBtn">Skärm vaken</button>
        <button id="settingsBtn">Inställningar</button>
      </section>
      <section class="card settings" id="settings">
        <select id="routeSelect" aria-label="Välj färjeled"></select>
        <div class="settings-grid">
          <button id="dayBtn">Dag</button>
          <button id="nightBtn">Natt</button>
          <button id="autoBtn">Auto</button>
        </div>
      </section>
    </aside>
  </main>
  <footer><span class="tiny-flag"></span>BluePeterDeparture v2.5</footer>
</div>
<script>
'use strict';
const VERSION='v2.5';
const API_KEY='24b95262774241ad8dbaf8ab05cf070a';
const API_URL='https://api.trafikinfo.trafikverket.se/v2/data.json';
const DEFAULT_ROUTE_ID=19;
let routeId=parseInt(localStorage.getItem('bpd_routeid')||DEFAULT_ROUTE_ID,10);
let nextDeparture=null, currentAnnouncementKey='', fivePlayed=false, depPlayed=false;
let postDepartureEndMs=0, wakeLock=null, audioCtx=null, lastDiffSec=null, isFetching=false;
const el=id=>document.getElementById(id);
const clockEl=el('clock'), routeNameEl=el('routeName'), fromHarborEl=el('fromHarbor'), countEl=el('count'), unitEl=el('unit'), nextTimeEl=el('nextTime'), labelEl=el('mainLabel'), apiStatusEl=el('apiStatus'), apiDotEl=el('apiDot'), routeIdTextEl=el('routeIdText'), soundStatusEl=el('soundStatus'), settingsEl=el('settings'), routeSelectEl=el('routeSelect');
const dayBtn=el('dayBtn'), nightBtn=el('nightBtn'), autoBtn=el('autoBtn');
function pad(n){return String(n).padStart(2,'0')}
function fmtClock(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
function fmtHM(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
function setThemeButtons(mode){
  [[dayBtn,'day','Dag'],[nightBtn,'night','Natt'],[autoBtn,'auto','Auto']].forEach(([b,m,t])=>{b.textContent=t+(mode===m?' ✓':''); b.classList.toggle('active',mode===m)})
}
function applyTheme(mode){
  localStorage.setItem('bpd_theme',mode); setThemeButtons(mode);
  const useDay = mode==='day' || (mode==='auto' && window.matchMedia('(prefers-color-scheme: light)').matches);
  document.body.classList.toggle('day',useDay);
}
applyTheme(localStorage.getItem('bpd_theme')||'night');
function ensureAudio(){
  if(!audioCtx){audioCtx=new (window.AudioContext||window.webkitAudioContext)()}
  if(audioCtx.state==='suspended') audioCtx.resume();
  soundStatusEl.textContent='OK';
}
function bell(time){
  ensureAudio(); const ctx=audioCtx;
  const o1=ctx.createOscillator(), o2=ctx.createOscillator(), o3=ctx.createOscillator();
  const g=ctx.createGain(), f=ctx.createBiquadFilter();
  o1.type='sine'; o2.type='triangle'; o3.type='sine';
  o1.frequency.setValueAtTime(660,time); o2.frequency.setValueAtTime(990,time); o3.frequency.setValueAtTime(1320,time);
  f.type='bandpass'; f.frequency.setValueAtTime(830,time); f.Q.setValueAtTime(2.8,time);
  g.gain.setValueAtTime(0.0001,time);
  g.gain.exponentialRampToValueAtTime(0.95,time+0.014);
  g.gain.exponentialRampToValueAtTime(0.28,time+0.22);
  g.gain.exponentialRampToValueAtTime(0.0001,time+0.92);
  o1.connect(f); o2.connect(f); o3.connect(f); f.connect(g); g.connect(ctx.destination);
  o1.start(time); o2.start(time); o3.start(time); o1.stop(time+0.96); o2.stop(time+0.96); o3.stop(time+0.96);
}
function playBells(n){ensureAudio(); const start=audioCtx.currentTime+0.04; for(let i=0;i<n;i++) bell(start+i*0.46)}
async function apiRequest(xml){const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/xml'},body:xml}); if(!res.ok) throw new Error('API '+res.status); return await res.json()}
async function getRoutes(){
  try{const xml='<REQUEST><LOGIN authenticationkey="'+API_KEY+'" /><QUERY objecttype="FerryRoute" schemaversion="1.2" orderby="Name asc"><INCLUDE>Name</INCLUDE><INCLUDE>Id</INCLUDE></QUERY></REQUEST>'; const data=await apiRequest(xml); const routes=data.RESPONSE.RESULT[0].FerryRoute||[]; routeSelectEl.innerHTML=''; routes.forEach(r=>{const opt=document.createElement('option'); opt.value=r.Id; opt.textContent=r.Name; if(Number(r.Id)===routeId) opt.selected=true; routeSelectEl.appendChild(opt)})}catch(e){console.warn(e)}
}
async function getDeparture(force=false){
  if(isFetching) return;
  const nowMs=Date.now();
  if(!force && postDepartureEndMs && nowMs < postDepartureEndMs) return;
  isFetching=true;
  try{
    const xml='<REQUEST><LOGIN authenticationkey="'+API_KEY+'" /><QUERY limit="1" objecttype="FerryAnnouncement" schemaversion="1.2" orderby="DepartureTime"><FILTER><EQ name="Route.Id" value="'+routeId+'" /><GT name="DepartureTime" value="$now" /></FILTER><INCLUDE>DepartureTime</INCLUDE><INCLUDE>Route.Name</INCLUDE><INCLUDE>Route.Id</INCLUDE><INCLUDE>FromHarbor.Name</INCLUDE></QUERY></REQUEST>';
    const data=await apiRequest(xml); const a=data.RESPONSE.RESULT[0].FerryAnnouncement[0]; const key=a.DepartureTime+'-'+a.Route.Id;
    if(key!==currentAnnouncementKey){currentAnnouncementKey=key; fivePlayed=false; depPlayed=false; postDepartureEndMs=0; lastDiffSec=null}
    nextDeparture=new Date(a.DepartureTime);
    routeNameEl.textContent=a.Route.Name; fromHarborEl.textContent='Från '+a.FromHarbor.Name; nextTimeEl.textContent='Nästa avgång '+fmtHM(nextDeparture); routeIdTextEl.textContent=a.Route.Id;
    apiStatusEl.textContent='OK'; apiDotEl.classList.remove('red');
  }catch(e){apiStatusEl.textContent='Fel'; apiDotEl.classList.add('red'); console.warn(e)}
  finally{isFetching=false}
}
function triggerAlarms(diffSec){
  if(lastDiffSec!==null && lastDiffSec>300 && diffSec<=300 && diffSec>0 && !fivePlayed){playBells(5); fivePlayed=true}
  if(lastDiffSec!==null && lastDiffSec>0 && diffSec<=0 && !depPlayed){playBells(3); depPlayed=true; postDepartureEndMs=nextDeparture.getTime()+60000}
  if(lastDiffSec===null && diffSec<=0 && !depPlayed){depPlayed=true; postDepartureEndMs=nextDeparture.getTime()+60000}
}
function renderCountdown(diffSec){
  if(diffSec<0 && postDepartureEndMs && Date.now()<postDepartureEndMs){
    const passed=Math.min(59, Math.max(1, Math.floor((Date.now()-nextDeparture.getTime())/1000)));
    labelEl.textContent='Avgång passerad'; countEl.textContent='-'+passed; unitEl.textContent='sekunder'; countEl.classList.add('red'); return;
  }
  labelEl.textContent='Tid kvar';
  const abs=Math.max(0,diffSec);
  if(abs<120){countEl.textContent=abs; unitEl.textContent='sekunder'}
  else {countEl.textContent=Math.floor(abs/60); unitEl.textContent='minuter'}
  countEl.classList.toggle('red', abs<=300);
}
function updateTime(){
  const now=new Date(); clockEl.textContent=fmtClock(now);
  if(!nextDeparture){countEl.textContent='--'; unitEl.textContent='minuter'; return}
  const diffSec=Math.floor((nextDeparture.getTime()-now.getTime())/1000);
  triggerAlarms(diffSec);
  if(diffSec<0 && postDepartureEndMs && Date.now()>=postDepartureEndMs){getDeparture(true); lastDiffSec=diffSec; return}
  renderCountdown(diffSec);
  lastDiffSec=diffSec;
}
function setup(){
  el('testFive').onclick=()=>playBells(5); el('testDeparture').onclick=()=>playBells(3); el('settingsBtn').onclick=()=>settingsEl.classList.toggle('open');
  dayBtn.onclick=()=>applyTheme('day'); nightBtn.onclick=()=>applyTheme('night'); autoBtn.onclick=()=>applyTheme('auto');
  routeSelectEl.onchange=()=>{routeId=parseInt(routeSelectEl.value,10); localStorage.setItem('bpd_routeid',routeId); currentAnnouncementKey=''; postDepartureEndMs=0; lastDiffSec=null; getDeparture(true)};
  el('wakeBtn').onclick=async()=>{try{if('wakeLock'in navigator){wakeLock=await navigator.wakeLock.request('screen'); el('wakeBtn').textContent='Skärm vaken ✓'}}catch(e){console.warn(e)}};
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible') getDeparture()});
  if(window.matchMedia){window.matchMedia('(prefers-color-scheme: light)').addEventListener?.('change',()=>{if((localStorage.getItem('bpd_theme')||'night')==='auto') applyTheme('auto')})}
  getRoutes(); getDeparture(true); setInterval(updateTime,1000); setInterval(()=>getDeparture(false),30000);
}
setup();
</script>
</body>
</html>
